name: Release

on:

  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Input custom tag name'
        required: true
        default: '0.1.0'
        type: string

jobs:

  build-windows:
    strategy:
      fail-fast: false
      matrix:
        include:
          - python-version: '3.10'
            pep-425-tag: 'cp310-cp310'
          - python-version: '3.12'
            pep-425-tag: 'cp312-cp312'

    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      
      - uses: actions/setup-python@v5
        with:
          python-version: ${{matrix.python-version}}

      - run: python -m pip install cmake
      - run: python -m pip wheel .

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-windows-${{matrix.python-version}}
          path: ${{github.workspace}}/vmk_spectrum3-*.whl

  build-linux:
    strategy:
      fail-fast: false
      matrix:
        include:
          - python-version: '3.10'
            pep-425-tag: 'cp310-cp310'
          - python-version: '3.12'
            pep-425-tag: 'cp312-cp312'

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      
      - uses: actions/setup-python@v5
        with:
          python-version: ${{matrix.python-version}}

      - uses: RalfG/python-wheels-manylinux-build@v0.5.0
        with:
          python-versions: ${{matrix.pep-425-tag}}

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-${{matrix.python-version}}
          path: ${{github.workspace}}/dist/vmk_spectrum3-*-manylinux*.whl
  build-intel-mac:
    strategy:
      fail-fast: false
      matrix:
        include:
          - python-version: '3.10'
            cibw-build: 'cp310-macosx_x86_64'
          - python-version: '3.12'
            cibw-build: 'cp312-macosx_x86_64'

    runs-on: macos-15-intel

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      
      - uses: actions/setup-python@v5
        with:
          python-version: ${{matrix.python-version}}
          
      - name: Build wheels via cibuildwheel
        uses: pypa/cibuildwheel@v2.22.0
        env:
          CIBW_BUILD: ${{matrix.cibw-build}}
          CIBW_ARCHS_MACOS: x86_64
          CIBW_BEFORE_BUILD: pip install cmake
          
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-mac-${{matrix.python-version}}
          path: ./wheelhouse/*.whl

  release:

    runs-on: ubuntu-latest

    needs: [build-windows, build-linux, build-intel-mac]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      
      - uses: actions/download-artifact@v4
        with:
          path: ${{github.workspace}}/all-wheels
          merge-multiple: true

      - name: Create custom tag release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{secrets.GITHUB_TOKEN}}
          tag_name: ${{ github.event.inputs.tag_name }}
          name: Release ${{ github.event.inputs.tag_name }}
          body: |
            Manual build for version ${{ github.event.inputs.tag_name }}
          draft: false
          prerelease: false
          files: |
            ${{github.workspace}}/all-wheels/*.whl

      - name: Update latest tag release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{secrets.GITHUB_TOKEN}}
          tag_name: latest
          name: Latest Build
          body: |
            Automatically synchronized with release ${{ github.event.inputs.tag_name }}
          draft: false
          prerelease: false
          files: |
            ${{github.workspace}}/all-wheels/*.whl
