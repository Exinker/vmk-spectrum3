name: Release

on:
  push:
    branches:
      - '**'
      - '!master'
  workflow_dispatch:

jobs:

  build-windows:
    strategy:
      fail-fast: false
      matrix:
        include:
          - python-version: '3.10'
            pep-425-tag: 'cp310-cp310'
          - python-version: '3.12'
            pep-425-tag: 'cp312-cp312'

    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Sync and update submodules
        shell: bash
        run: |
          git submodule init
          git submodule update --init --recursive --remote

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install cmake ninja numpy pybind11

      - name: Build wheel
        run: python -m pip wheel . --no-build-isolation

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheels-windows-${{ matrix.python-version }}
          path: ${{ github.workspace }}/vmk_spectrum3-*.whl
